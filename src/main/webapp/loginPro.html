<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right,#4facfe,#00f2fe);
}

form{
    background:white;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

label{
    font-weight:bold;
    color:#444;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
    transition:0.3s;
}

input:focus{
    border-color:#4facfe;
    box-shadow:0 0 8px rgba(79,172,254,0.5);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#007bff;
}

</style>
</head>
<body>

<form action="loginPro" method="post">
Email:
<input type="email" name="email" placeholder="Enter the Email" autocomplete="off" required>
<br>
Password:
<input type="password" name="password" placeholder="Enter the Password" autocomplete="off" required>
<br>
<button>Login</button>
</form>
</body>
</html>
